[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ravey-ai-tasks"
version = "0.1.0"
description = "Babycare AI 任务规划 Agent 应用"
requires-python = ">=3.11"
dependencies = [
    "ravey-ai-agent-framework",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pyyaml>=6.0",
]

[tool.setuptools.packages.find]
include = ["ravey*"]
